- tag: "Identity & Device Safety System"
  title: "Product Thinking, Compliance & User Retention"
  desc: "I had one user story I couldn't stop thinking about: a user loses their phone and someone picks it up. That question led to a strict one-device policy, an async KYC pipeline that keeps users off the critical path, and a PII architecture that gives sensitive data a single owner with one access path."
  href: "/kyc/"

- tag: "Payment Intent Architecture"
  title: "Product & Engineering Thinking for Payments"
  desc: "Before I touched architecture, I spent time watching how users actually interacted with payment apps. One thing kept showing up: the products people trusted always showed the destination before the amount. I designed the entire payment flow around that insight."
  href: "/payments/"

- tag: "Fraud Risk & Profiling"
  title: "Product Thinking & Engineering for Fraud Management"
  desc: "I noticed the fraud score was always computed at the moment a decision was needed — which meant the system only knew what it had time to check right then. I built something different: a service that watches continuously in the background, so by the time a transaction reaches execution, the risk score is already waiting."
  href: "/fraud/"
